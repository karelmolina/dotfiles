# Dotfiles configuration registry
# Tracks which configurations are active per supported operating system.
#
# Status values:
#   active      - Currently used and should be installed/synchronized.
#   inactive    - Kept for reference but not currently used; do not install.
#   unsupported - Not applicable for this OS.
#
# Install methods:
#   stow  - Deploy with GNU Stow to ~/.config/<package> (default).
#   link  - Symlink the package directory to the configured target.
#   none  - Not installed automatically (e.g. wallpapers, docs).

[meta]
version = "1.0.0"
supported_os = ["macos", "omarchy"]

[aerospace]
macos = "inactive"
omarchy = "unsupported"
method = "stow"
description = "Tiling window manager for macOS"
notes = "Replaced by amethyst; config kept for reference"

[amethyst]
macos = "active"
omarchy = "unsupported"
method = "stow"
description = "Tiling window manager for macOS"
notes = "Current window manager on macOS"

