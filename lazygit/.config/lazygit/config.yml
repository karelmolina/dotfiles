# Lazygit Configuration for v0.59.0
# Full documentation: https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

gui:
  theme:
    activeBorderColor:
      - "#7aa2f7"
      - "bold"
    inactiveBorderColor:
      - "#565f89"
    optionsTextColor:
      - "#7aa2f7"
    selectedLineBgColor:
      - "#283457"
    cherryPickedCommitBgColor:
      - "#283457"
    cherryPickedCommitFgColor:
      - "#7aa2f7"
    unstagedChangesColor:
      - "#f7768e"
    defaultFgColor:
      - "#c0caf5"
    searchingActiveBorderColor:
      - "#e0af68"
  scrollHeight: 2
  scrollPastBottom: true
  mouseEvents: true
  sidePanelWidth: 0.3333
  expandFocusedSidePanel: false
  mainPanelSplitMode: flexible
  showListFooter: true
  showFileTree: true
  showRandomTip: false
  showCommandLog: true
  showBottomLine: true
  showPanelJumps: true
  nerdFontsVersion: "3"
  statusPanelView: dashboard
  commitAuthorShortLength: 10
  commitAuthorLongLength: 17
  commitHashLength: 8
  screenMode: normal
  border: rounded
git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
  commit:
    signOff: false
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  merging:
    manualCommit: false
    args: ""
  mainBranches:
    - master
    - main
    - develop
    - development
  skipHookPrefix: WIP
  autoFetch: true
  autoRefresh: true
  branchLogCmd: "git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --"
  overrideGpg: false
  disableForcePushing: false
  parseEmoji: true
  diffContextSize: 3
  allBranchesLogCmds:
    - git log --graph --all --color=always --abbrev-commit --decorate --date=relative --pretty=medium
update:
  method: never
  days: 14
refresher:
  refreshInterval: 10
  fetchInterval: 60
confirmOnQuit: false
disableStartupPopups: false
notARepository: prompt
promptToReturnFromSubprocess: true
customCommands:
  # Generate full changelog (auto-detects project config)
  - key: "<c-g>"
    command: "$HOME/dotfiles/bin/gc-smart -o CHANGELOG.md"
    context: "global"
    description: "Generate full changelog"
    output: none
  # Prepend unreleased changes to existing changelog
  - key: "<c-p>"
    command: "$HOME/dotfiles/bin/gc-smart --unreleased --prepend CHANGELOG.md"
    context: "global"
    description: "Prepend unreleased changes to changelog"
    output: none
  - key: "<c-l>"
    command: "$HOME/dotfiles/bin/gc-smart --latest"
    context: "global"
    description: "Show latest changelog"
    output: popup
  # Create a new release with specified version tag
  - key: "#"
    command: "$HOME/dotfiles/bin/gc-smart -u --tag {{.Form.Tag}} --prepend CHANGELOG.md"
    context: "global"
    description: "Create release with tag"
    output: none
    prompts:
      - type: "input"
        title: "Version Tag"
        key: "Tag"
