### Force X11 to avoid Wayland color manager protocol issues
linux_display_server x11

### Adding Jetbrains Font
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# font_size 11.0
font_size 12.0

### Set nvim as default editor
editor           nvim

# copy_on_select no
copy_on_select yes

# window_alert_on_bell yes
window_alert_on_bell no

single_window_margin_width 0
window_margin_width     10

# Background
background_image        ~/dotfiles/wallpapers/od_torvalds.png
background_image_layout scaled
# background_tint         0.60
# background_tint_gaps    -10.0

window_border_width     1pt
active_border_color     #44ffff

enabled_layouts Tall, *

tab_bar_style       powerline
tab_powerline_style slanted
